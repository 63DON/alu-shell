{"name": "Fix script permissions", "on": {"workflow_dispatch": null}, "jobs": {"fix-permissions": {"runs-on": "ubuntu-latest", "permissions": {"contents": "write"}, "steps": [{"uses": "actions/checkout@v4"}, {"name": "Make scripts executable and commit", "run": "chmod +x loops_conditions_and_parsing/* init_files_variables_and_expansions/* basics/* io_redirections_and_filters/* permissions/* 2>/dev/null || true\ngit config user.name 'github-actions[bot]'\ngit config user.email 'github-actions[bot]@users.noreply.github.com'\ngit add -A\nif git diff --cached --quiet; then echo 'No permission changes needed'; else git commit -m 'Fix executable permissions on script files' && git push; fi"}]}}}
